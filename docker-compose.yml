version: "3.8"

services:
  # 1. Contenedor de la Base de Datos (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: novasalud_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Contenedor del Backend
  backend:
    build: ./backend
    container_name: novasalud_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/NovaSaludDB
      - JWT_SECRET=tu_clave_secreta_jwt_aqui
    depends_on:
      - mongodb

  # 3. Contenedor del Frontend
  frontend:
    build: ./frontend
    container_name: novasalud_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
